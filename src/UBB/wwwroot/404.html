<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Copilot UBB Simulator</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="UBB.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading…</span>
                </div>
                <p class="mt-3 text-muted">Loading simulator…</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999">
        An unhandled error has occurred.
        <a href="." class="alert-link">Reload</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>
        window.ubb = {
            initPopovers: function () {
                if (!window.bootstrap) return;
                document.querySelectorAll('[data-bs-toggle="popover"]').forEach(function (el) {
                    bootstrap.Popover.getOrCreateInstance(el, {
                        trigger: 'hover focus',
                        delay: { show: 100, hide: 600 }
                    });
                });
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
