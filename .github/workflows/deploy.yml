name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-flight production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish · Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish src/UBB/UBB.csproj -c Release -o publish

      - name: Rewrite base href for project pages
        # For a project site (username.github.io/<repo>) the <base href> must match the repo path.
        # Derives the repo name automatically; skip for user/org pages by setting repo variable PAGES_ROOT=true.
        if: ${{ vars.PAGES_ROOT != 'true' }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|" publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
