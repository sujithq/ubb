name: E2E Tests (TD-02, TD-03 URL Sharing)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright dependencies
        working-directory: tests/UBB.E2E
        run: |
          npm ci
          npx playwright install
      
      - name: Build solution
        run: dotnet build
      
      - name: Run E2E tests
        working-directory: tests/UBB.E2E
        run: npm test
        env:
          CI: true
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/UBB.E2E/playwright-report/
          retention-days: 30
      
      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'tests/UBB.E2E/playwright-report/summary.json';
            
            let summary = '✅ E2E Tests Passed';
            try {
              if (fs.existsSync(reportPath)) {
                const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                summary = `📊 E2E Results: ${report.expected} passed, ${report.unexpected || 0} failed`;
              }
            } catch (e) {
              summary = '⚠️ E2E Tests completed (check artifacts for details)';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
